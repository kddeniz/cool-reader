<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Reader | Markdown editor with live preview (browser-only)</title>
    <meta
      name="description"
      content="Cool Reader: free browser markdown editor with live HTML preview, drag-and-drop .md files, export to .md, and DOMPurify-sanitized output. No server or build step. Try cool-reader.com or open index.html locally."
    />
    <link rel="canonical" href="https://cool-reader.com/" />
    <meta name="theme-color" content="#1c1a24" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cool-reader.com/" />
    <meta property="og:title" content="Cool Reader | Markdown editor with live preview" />
    <meta
      property="og:description"
      content="Write markdown in the browser, see safe live HTML preview. marked + DOMPurify, no backend."
    />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cool Reader | Markdown editor with live preview" />
    <meta
      name="twitter:description"
      content="Browser-only markdown editor: live preview, file open/export, DOMPurify sanitization."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Cool Reader",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web browser",
        "description": "Client-side markdown editor with live HTML preview, file open and download, drag-and-drop, and DOMPurify-sanitized rendering. No server required.",
        "url": "https://cool-reader.com/",
        "isAccessibleForFree": true,
        "license": "https://opensource.org/licenses/MIT",
        "softwareVersion": "1.0",
        "author": {
          "@type": "Person",
          "name": "Kürşad"
        },
        "featureList": [
          "Live markdown to HTML preview with debounced updates",
          "Open and edit .md, .markdown, and .txt in the browser",
          "Download edited markdown as .md",
          "Drag-and-drop file load onto the editor",
          "HTML sanitized with DOMPurify before DOM insertion"
        ],
        "softwareHelp": {
          "@type": "CreativeWork",
          "url": "https://github.com/kddeniz/cool-reader"
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="app" id="app">
      <header class="toolbar">
        <div class="toolbar__start">
          <button
            type="button"
            class="toolbar__toggle"
            id="toggleEditor"
            aria-controls="editorPane"
            aria-expanded="true"
            aria-label="Sol paneli aç veya kapat"
            title="Sol paneli aç/kapat"
          >
            <span class="toolbar__toggle-icon" aria-hidden="true">☰</span>
          </button>
          <span class="toolbar__brand">Cool Reader</span>
        </div>
        <div class="toolbar__actions">
          <label class="toolbar__file">
            <span class="visually-hidden">Markdown dosyası aç</span>
            <input
              type="file"
              id="fileInput"
              accept=".md,.markdown,.txt,text/markdown,text/plain"
            />
            <span class="toolbar__file-label">Dosya aç</span>
          </label>
          <button type="button" class="toolbar__download" id="downloadBtn" title="Geçerli metni .md olarak indir">
            İndir (.md)
          </button>
        </div>
      </header>
      <main class="main">
        <section class="pane pane--editor" id="editorPane">
          <div class="pane__inner pane__inner--editor" id="dropZone">
            <textarea
              id="editor"
              class="editor"
              spellcheck="false"
              placeholder="Markdown yazın veya dosya sürükleyin…"
            ></textarea>
          </div>
        </section>
        <section class="pane pane--preview" id="previewPane" aria-label="Önizleme">
          <div class="pane__inner pane__inner--preview" id="preview"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
