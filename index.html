<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J7W1HJ23CV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-J7W1HJ23CV");
    </script>
    <title>Cool Reader | Markdown editor with live preview (browser-only)</title>
    <meta
      name="description"
      content="Cool Reader: free browser markdown editor with live HTML preview, drag-and-drop .md files, export to .md or .html, and DOMPurify-sanitized output. No server or build step. Try cool-reader.com or open index.html locally."
    />
    <link rel="canonical" href="https://cool-reader.com/" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="theme-color" content="#1c1a24" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cool-reader.com/" />
    <meta property="og:title" content="Cool Reader | Markdown editor with live preview" />
    <meta
      property="og:description"
      content="Write markdown in the browser, see safe live HTML preview, export .md or standalone .html. marked + DOMPurify, no backend."
    />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cool Reader | Markdown editor with live preview" />
    <meta
      name="twitter:description"
      content="Browser-only markdown editor: live preview, file open, export .md or .html, DOMPurify sanitization."
    />
    <script type="application/ld+json" src="schema-ld.json"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;0,700&family=Literata:ital,opsz,wght@0,14..72,400;0,14..72,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
      integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
      integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="app" id="app">
      <header class="toolbar">
        <div class="toolbar__start">
          <button
            type="button"
            class="toolbar__toggle"
            id="toggleEditor"
            aria-controls="editorPane"
            aria-expanded="true"
            aria-label="Show or hide editor panel"
            title="Toggle editor panel"
          >
            <span class="toolbar__toggle-icon" aria-hidden="true">☰</span>
          </button>
          <div class="toolbar__identity">
            <img
              class="toolbar__logo"
              src="icon.svg"
              width="36"
              height="36"
              alt=""
              aria-hidden="true"
              decoding="async"
            />
            <div class="toolbar__identity-copy">
              <span class="toolbar__brand">Cool Reader</span>
              <p class="toolbar__tagline" id="toolbarTagline">
                Browser-only Markdown with live, sanitized HTML preview. Open or export .md and .html. No account.
              </p>
            </div>
          </div>
        </div>
        <div class="toolbar__actions">
          <div class="toolbar__theme">
            <details class="theme-details" id="themeDetails">
              <summary
                class="theme-details__summary"
                aria-label="Reading appearance and export theme"
                title="Preview and export reading theme"
              >
                Aa
              </summary>
              <section
                class="theme-panel"
                id="themePanel"
                aria-label="Reading theme"
              >
                <p class="theme-panel__row">
                  <label for="themePreset" class="theme-panel__label">Preset</label>
                  <select id="themePreset" class="theme-panel__select" aria-label="Theme preset">
                  </select>
                </p>
                <p class="theme-panel__row">
                  <label for="themeBodyFont" class="theme-panel__label">Body text</label>
                  <select
                    id="themeBodyFont"
                    class="theme-panel__select"
                    aria-label="Body text font for preview and export"
                  >
                  </select>
                </p>
                <p class="theme-panel__row">
                  <span class="theme-panel__label" id="labelBodySize">Body size</span>
                  <input
                    type="range"
                    class="theme-panel__range"
                    id="themeBodySize"
                    min="875"
                    max="1400"
                    step="12"
                    aria-valuemin="0.875"
                    aria-valuemax="1.4"
                    aria-labelledby="labelBodySize"
                    aria-label="Body text size"
                  />
                </p>
                <p class="theme-panel__row">
                  <span class="theme-panel__label" id="labelLineHeight">Line height</span>
                  <input
                    type="range"
                    class="theme-panel__range"
                    id="themeLineHeight"
                    min="128"
                    max="200"
                    step="1"
                    aria-labelledby="labelLineHeight"
                    aria-label="Line height"
                  />
                </p>
                <p class="theme-panel__row theme-panel__row--btns">
                  <button type="button" class="theme-panel__reset" id="themeReset" title="Restore default reading theme">
                    Reset
                  </button>
                </p>
              </section>
            </details>
          </div>
          <button
            type="button"
            class="toolbar__sync-scroll"
            id="syncScrollToggle"
            aria-pressed="true"
            title="Keep editor and preview scroll position aligned"
            aria-label="Sync scroll between editor and preview"
          >
            Sync scroll
          </button>
          <label class="toolbar__file">
            <span class="visually-hidden">Open markdown file</span>
            <input
              type="file"
              id="fileInput"
              accept=".md,.markdown,.txt,text/markdown,text/plain"
            />
            <span class="toolbar__file-label">Open file</span>
          </label>
          <button type="button" class="toolbar__download" id="downloadBtn" title="Download current text as .md">
            Download (.md)
          </button>
          <button type="button" class="toolbar__download" id="downloadHtmlBtn" title="Download preview as a standalone .html file">
            Download (.html)
          </button>
          <button
            type="button"
            class="toolbar__download"
            id="printThemeBtn"
            title="Opens the browser print dialog—choose a printer or Save as PDF"
            aria-label="Print or save the preview as PDF (browser print dialog)"
          >
            Print / PDF
          </button>
        </div>
      </header>
      <div id="appAlert" class="app-alert" role="alert" aria-live="assertive" hidden></div>
      <main class="main">
        <section class="pane pane--editor" id="editorPane">
          <div class="pane__inner pane__inner--editor" id="dropZone">
            <textarea
              id="editor"
              class="editor"
              spellcheck="false"
              aria-label="Markdown editor"
              placeholder="Write markdown or drop a file here…"
            ></textarea>
          </div>
        </section>
        <section class="pane pane--preview" id="previewPane" aria-label="Preview">
          <div class="pane__inner pane__inner--preview" id="preview"></div>
        </section>
      </main>
      <footer class="app-footer">
        <a
          class="app-footer__link"
          href="https://github.com/kddeniz/cool-reader"
          rel="noopener noreferrer"
          target="_blank"
        >Source on GitHub</a>
        <p class="app-footer__credit">Made with ❤️ by Kürşad</p>
      </footer>
    </div>
    <script src="theme.js"></script>
    <script src="app.js"></script>
  </body>
</html>
